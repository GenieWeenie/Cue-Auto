name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy strict
        run: mypy src/cue_agent

      - name: Pytest + coverage
        run: pytest -q --cov=src/cue_agent --cov-report=term-missing --cov-fail-under=82

