services:
  cue-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: cue-agent:local
    container_name: cue-agent
    env_file:
      - .env.production
    environment:
      CUE_STATE_DB_PATH: /data/cue_state.db
      CUE_SKILLS_DIR: /app/skills
      CUE_SOUL_MD_PATH: /app/SOUL.md
      CUE_HEALTHCHECK_ENABLED: "true"
      CUE_HEALTHCHECK_HOST: 0.0.0.0
      CUE_HEALTHCHECK_PORT: "8080"
    command: /bin/sh -c "cue-agent --mode $${CUE_RUN_MODE:-polling}"
    volumes:
      - ./data:/data
      - ./skills:/app/skills
      - ./SOUL.md:/app/SOUL.md:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
